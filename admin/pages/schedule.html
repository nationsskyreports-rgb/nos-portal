<style>
/* ── Schedule Grid ── */
.sched-table { width:100%; border-collapse:collapse; font-size:12px; }
.sched-table th {
  padding:10px 8px; background:var(--surface2);
  color:var(--muted); font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:1px;
  border-bottom:1px solid var(--border);
  text-align:center; white-space:nowrap;
}
.sched-table th.agent-col { text-align:left; min-width:140px; }
.sched-table td {
  padding:6px 6px; border-bottom:1px solid var(--border);
  border-right:1px solid var(--border); text-align:center;
  vertical-align:middle;
}
.sched-table td.agent-col {
  text-align:left; padding:8px 12px;
  font-weight:700; font-size:13px;
  background:var(--surface2);
}
.sched-table tr:last-child td { border-bottom:none; }

.shift-select {
  width:100%; padding:6px 4px;
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:8px; color:var(--text);
  font-size:11px; font-family:'Plus Jakarta Sans',sans-serif;
  outline:none; cursor:pointer; transition:all 0.2s;
  text-align:center;
}
.shift-select:focus { border-color:var(--gold); background:var(--surface3); }
.shift-select.is-off    { color:var(--muted); }
.shift-select.is-work   { color:#10B981; border-color:rgba(16,185,129,0.3); background:rgba(16,185,129,0.05); }
.shift-select.is-annual { color:#8B5CF6; border-color:rgba(139,92,246,0.3); background:rgba(139,92,246,0.05); }
.shift-select.is-sick   { color:#EF4444; border-color:rgba(239,68,68,0.3);  background:rgba(239,68,68,0.05); }
.shift-select.is-casual { color:#F59E0B; border-color:rgba(245,158,11,0.3); background:rgba(245,158,11,0.05); }
.shift-select.is-ph     { color:#3B82F6; border-color:rgba(59,130,246,0.3); background:rgba(59,130,246,0.05); }

.day-header { display:flex; flex-direction:column; align-items:center; gap:2px; }
.day-name   { font-size:11px; font-weight:700; color:var(--text); }
.day-date   { font-size:10px; color:var(--muted); }
.day-today  { color:var(--gold) !important; }

.week-tab {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:10px; cursor:pointer;
  border:1.5px solid var(--border); background:var(--surface2);
  color:var(--muted); font-size:12px; font-weight:600;
  transition:all 0.2s; white-space:nowrap;
}
.week-tab:hover  { border-color:var(--border2); color:var(--text); }
.week-tab.active { border-color:var(--gold); color:var(--gold); background:rgba(212,175,55,0.08); }
.week-tab .wk-status { font-size:9px; padding:2px 7px; border-radius:20px; }

.count-badge {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:20px; height:20px; padding:0 6px;
  border-radius:10px; font-size:10px; font-weight:700;
  background:rgba(212,175,55,0.1); color:var(--gold);
}

.day-counts {
  display:flex; gap:4px; justify-content:center;
  padding:4px 8px; border-top:1px solid var(--border);
  flex-wrap:wrap;
}
.day-count-item {
  font-size:9px; font-weight:700;
  padding:2px 6px; border-radius:6px;
}
</style>
</head>

<script>
// ── Init ──
const session = checkAuth();
if (session) {
  document.getElementById('admin-name').innerText = session.username || 'Admin';
  document.getElementById('admin-avatar').innerText = initials(session.username || 'Admin');
}

let allWeeks      = [];
let allAgents     = [];
let allShiftTypes = [];
let currentWeek   = null;
let scheduleData  = {}; // { agentId_date: { day_type, shift_type_id } }
let unsaved       = false;

const DAY_TYPES = ['Work','Off','Annual','Sick','Casual','PH','Task'];
const TODAY     = new Date().toISOString().split('T')[0];

// ── Load All ──
async function loadAll() {
  await Promise.all([loadAgents(), loadShiftTypes(), loadWeeks()]);
}

async function loadAgents() {
  const { data } = await db.from('agents').select('id,formal_name,xcally_id').eq('status','Active').order('formal_name');
  allAgents = data || [];
}

async function loadShiftTypes() {
  const { data } = await db.from('shift_types').select('*').eq('is_active',true).order('start_time');
  allShiftTypes = data || [];
}

// ── Load Weeks ──
async function loadWeeks() {
  const { data } = await db.from('schedule_weeks').select('*').order('week_start', { ascending: false });
  allWeeks = data || [];
  renderWeekTabs();
}

function renderWeekTabs() {
  const container = document.getElementById('weeks-tabs');
  document.getElementById('week-count').innerText = `${allWeeks.length} week(s)`;

  if (!allWeeks.length) {
    container.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:8px;">No weeks yet. Create one!</div>`;
    return;
  }

  const statusColor = { Draft:'badge-muted', Open:'badge-warning', Published:'badge-success', Closed:'badge-danger' };

  container.innerHTML = allWeeks.map(w => `
    <div class="week-tab ${currentWeek?.id === w.id ? 'active' : ''}" onclick="selectWeek('${w.id}')">
      <i class="fas fa-calendar-week" style="font-size:12px;"></i>
      <div>
        <div style="font-size:12px;font-weight:700;">${formatDateShort(w.week_start)} → ${formatDateShort(w.week_end)}</div>
        <div style="font-size:10px;color:var(--muted);">${w.note || ''}</div>
      </div>
      <span class="badge ${statusColor[w.status]||'badge-muted'} wk-status">${w.status}</span>
    </div>
  `).join('');
}

// ── Select Week ──
async function selectWeek(weekId) {
  if (unsaved) {
    const go = confirm('You have unsaved changes. Discard?');
    if (!go) return;
    unsaved = false;
  }

  currentWeek = allWeeks.find(w => w.id === weekId);
  renderWeekTabs();

  document.getElementById('no-week-selected').style.display = 'none';
  document.getElementById('schedule-card').style.display    = 'block';

  await loadScheduleGrid();
}

// ── Load Schedule Grid ──
async function loadScheduleGrid() {
  if (!currentWeek) return;

  const gridEl = document.getElementById('schedule-grid');
  gridEl.innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;

  // Update header
  document.getElementById('sched-week-title').innerText =
    `${formatDateFull(currentWeek.week_start)}  →  ${formatDateFull(currentWeek.week_end)}`;

  const statusColor = { Draft:'badge-muted', Open:'badge-warning', Published:'badge-success', Closed:'badge-danger' };
  document.getElementById('sched-status-badge').innerHTML =
    `<span class="badge ${statusColor[currentWeek.status]||'badge-muted'}">${currentWeek.status}</span>`;

  // Load existing schedule
  const { data: existing } = await db.from('schedule')
    .select('*')
    .eq('week_id', currentWeek.id);

  scheduleData = {};
  (existing || []).forEach(s => {
    scheduleData[`${s.agent_id}_${s.shift_date}`] = {
      id:            s.id,
      day_type:      s.day_type,
      shift_type_id: s.shift_type_id
    };
  });

  // Generate dates for the week
  const dates = getWeekDates(currentWeek.week_start, currentWeek.week_end);

  // Build table
  let html = `<table class="sched-table"><thead><tr>
    <th class="agent-col">Agent</th>`;

  dates.forEach(d => {
    const isToday = d.iso === TODAY;
    html += `<th>
      <div class="day-header">
        <span class="day-name ${isToday?'day-today':''}">${d.dayName}</span>
        <span class="day-date ${isToday?'day-today':''}">${d.display}</span>
      </div>
    </th>`;
  });
  html += `</tr></thead><tbody>`;

  allAgents.forEach(agent => {
    html += `<tr>
      <td class="agent-col">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="agent-avatar" style="width:26px;height:26px;font-size:9px;flex-shrink:0;">
            ${initials(agent.formal_name)}
          </div>
          <span>${agent.formal_name}</span>
        </div>
      </td>`;

    dates.forEach(d => {
      const key   = `${agent.id}_${d.iso}`;
      const entry = scheduleData[key] || { day_type: 'Off', shift_type_id: null };
      const cls   = getSelectClass(entry.day_type, entry.shift_type_id);

      html += `<td>
        <select class="shift-select ${cls}"
          data-agent="${agent.id}" data-date="${d.iso}"
          onchange="onShiftChange(this)">
          ${buildShiftOptions(entry.day_type, entry.shift_type_id)}
        </select>
      </td>`;
    });

    html += `</tr>`;
  });

  html += `</tbody></table>`;

  // Day count rows
  html += buildCountRow(dates);

  gridEl.innerHTML = html;
  updateSummary(dates);
}

// ── Build Shift Options ──
function buildShiftOptions(dayType, shiftTypeId) {
  let opts = `<option value="Off" ${dayType==='Off'?'selected':''}>— Off —</option>`;

  // Work shifts
  allShiftTypes.forEach(st => {
    const val = `Work__${st.id}`;
    const sel = dayType==='Work' && shiftTypeId===st.id ? 'selected' : '';
    opts += `<option value="${val}" ${sel}>${formatTime(st.start_time)} - ${formatTime(st.end_time)} (${st.name})</option>`;
  });

  // Leave types
  ['Annual','Sick','Casual','PH','Task'].forEach(t => {
    opts += `<option value="${t}" ${dayType===t?'selected':''}>${t}</option>`;
  });

  return opts;
}

function getSelectClass(dayType, shiftTypeId) {
  if (dayType === 'Work')   return 'is-work';
  if (dayType === 'Annual') return 'is-annual';
  if (dayType === 'Sick')   return 'is-sick';
  if (dayType === 'Casual') return 'is-casual';
  if (dayType === 'PH')     return 'is-ph';
  return 'is-off';
}

// ── On Shift Change ──
function onShiftChange(sel) {
  const agentId = sel.dataset.agent;
  const date    = sel.dataset.date;
  const val     = sel.value;
  const key     = `${agentId}_${date}`;

  // Parse value
  let dayType = val, shiftTypeId = null;
  if (val.startsWith('Work__')) {
    dayType     = 'Work';
    shiftTypeId = val.split('__')[1];
  }

  // Update local state
  scheduleData[key] = { ...scheduleData[key], day_type: dayType, shift_type_id: shiftTypeId };

  // Update style
  sel.className = `shift-select ${getSelectClass(dayType, shiftTypeId)}`;

  unsaved = true;
  document.getElementById('save-btn').innerHTML = '<i class="fas fa-save"></i> Save <span style="color:var(--warning);font-size:10px;">●</span>';
}

// ── Save Schedule ──
async function saveSchedule() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

  try {
    const upserts = [];

    Object.keys(scheduleData).forEach(key => {
      const [agentId, date] = key.split('_');
      const entry = scheduleData[key];
      upserts.push({
        agent_id:      agentId,
        week_id:       currentWeek.id,
        shift_date:    date,
        day_type:      entry.day_type,
        shift_type_id: entry.shift_type_id || null,
        status:        'Approved',
        updated_at:    new Date().toISOString(),
      });
    });

    if (upserts.length) {
      const { error } = await db.from('schedule')
        .upsert(upserts, { onConflict: 'agent_id,shift_date' });
      if (error) throw error;
    }

    unsaved = false;
    showToast('Schedule saved!', 'success');
    btn.innerHTML = '<i class="fas fa-save"></i> Save';

  } catch(e) {
    showToast('Save failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── Publish Week ──
async function publishWeek() {
  openModal('Publish Week',
    'Publishing will make this schedule visible to all agents. Continue?',
    async () => {
      try {
        await saveSchedule();
        const { error } = await db.from('schedule_weeks')
          .update({ status: 'Published' })
          .eq('id', currentWeek.id);
        if (error) throw error;
        currentWeek.status = 'Published';
        showToast('Week published! Agents can now see it.', 'success');
        await loadWeeks();
        renderWeekTabs();
        document.getElementById('sched-status-badge').innerHTML =
          '<span class="badge badge-success">Published</span>';
      } catch(e) {
        showToast('Failed: ' + e.message, 'error');
      }
    }
  );
}

// ── Delete Week ──
async function deleteWeek() {
  openModal('Delete Week',
    `Delete week "${formatDateShort(currentWeek.week_start)} → ${formatDateShort(currentWeek.week_end)}"? All schedule data will be lost.`,
    async () => {
      try {
        await db.from('schedule').delete().eq('week_id', currentWeek.id);
        await db.from('schedule_weeks').delete().eq('id', currentWeek.id);
        currentWeek = null;
        scheduleData = {};
        document.getElementById('schedule-card').style.display = 'none';
        document.getElementById('no-week-selected').style.display = 'block';
        showToast('Week deleted!', 'warning');
        loadWeeks();
      } catch(e) {
        showToast('Failed: ' + e.message, 'error');
      }
    }
  );
}

// ── New Week Panel ──
function openNewWeekPanel() {
  document.getElementById('panel-title').innerText = 'Create New Week';
  document.getElementById('panel-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Week Start <span class="req">*</span></label>
        <input type="date" id="nw-start" class="form-input" onchange="autoSetEnd()">
      </div>
      <div class="form-group">
        <label class="form-label">Week End <span class="req">*</span></label>
        <input type="date" id="nw-end" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Note (Optional)</label>
        <input type="text" id="nw-note" class="form-input" placeholder="e.g. Week 15 - April">
      </div>
      <div class="form-group">
        <label class="form-label">Initial Status</label>
        <select id="nw-status" class="form-input">
          <option value="Draft">Draft</option>
          <option value="Open">Open (Agents can request)</option>
          <option value="Published">Published (Visible to agents)</option>
        </select>
      </div>
    </div>
    <div class="divider"></div>
    <div style="font-size:12px;color:var(--muted);line-height:1.8;">
      <i class="fas fa-info-circle" style="color:var(--gold);margin-right:6px;"></i>
      <b>Draft</b> — Hidden from agents, you're still working on it<br>
      <i class="fas fa-info-circle" style="color:var(--warning);margin-right:6px;"></i>
      <b>Open</b> — Agents can submit shift requests<br>
      <i class="fas fa-info-circle" style="color:var(--success);margin-right:6px;"></i>
      <b>Published</b> — Final schedule visible to all agents
    </div>
  `;
  document.getElementById('panel-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closePanel()">Cancel</button>
    <button class="btn btn-primary" onclick="createWeek()">
      <i class="fas fa-plus"></i> Create Week
    </button>
  `;
  openPanel();

  // Set default dates (next week)
  const nextMon = getNextSunday();
  document.getElementById('nw-start').value = nextMon;
  autoSetEnd();
}

function autoSetEnd() {
  const start = document.getElementById('nw-start').value;
  if (!start) return;
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  document.getElementById('nw-end').value = end.toISOString().split('T')[0];
}

async function createWeek() {
  const start  = document.getElementById('nw-start').value;
  const end    = document.getElementById('nw-end').value;
  const note   = document.getElementById('nw-note').value.trim();
  const status = document.getElementById('nw-status').value;

  if (!start || !end) { showToast('Please select start and end dates', 'error'); return; }
  if (start > end)    { showToast('Start date must be before end date', 'error'); return; }

  try {
    const { data, error } = await db.from('schedule_weeks')
      .insert({ week_start: start, week_end: end, note, status, created_at: new Date().toISOString() })
      .select().single();
    if (error) throw error;

    showToast('Week created!', 'success');
    closePanel();
    await loadWeeks();
    selectWeek(data.id);
  } catch(e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

// ── Shift Types Panel ──
function openShiftTypesPanel() {
  document.getElementById('panel-title').innerText = 'Shift Types';
  renderShiftTypesPanel();
  openPanel();
}

function renderShiftTypesPanel() {
  const body = document.getElementById('panel-body');
  body.innerHTML = `
    <div style="margin-bottom:16px;">
      <button class="btn btn-primary btn-sm" onclick="addShiftTypeRow()">
        <i class="fas fa-plus"></i> Add Shift Type
      </button>
    </div>
    <div id="shift-types-list">
      ${allShiftTypes.map(st => renderShiftTypeRow(st)).join('')}
    </div>
    <div id="new-shift-rows"></div>
  `;
  document.getElementById('panel-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closePanel()">Close</button>
    <button class="btn btn-primary" onclick="saveShiftTypes()">
      <i class="fas fa-save"></i> Save All
    </button>
  `;
}

function renderShiftTypeRow(st) {
  return `
    <div class="form-grid form-grid-3" style="margin-bottom:10px;align-items:end;" data-id="${st.id}">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-input st-name" value="${st.name}" placeholder="e.g. Morning">
      </div>
      <div class="form-group">
        <label class="form-label">Start</label>
        <input type="time" class="form-input st-start" value="${st.start_time}">
      </div>
      <div class="form-group">
        <label class="form-label">End</label>
        <input type="time" class="form-input st-end" value="${st.end_time}">
      </div>
      <div class="form-group" style="grid-column:1/-1;display:flex;justify-content:flex-end;">
        <button class="btn btn-danger btn-sm" onclick="deleteShiftType('${st.id}',this)">
          <i class="fas fa-trash"></i> Delete
        </button>
      </div>
    </div>
    <div class="divider" style="margin:8px 0;"></div>
  `;
}

let newShiftCount = 0;
function addShiftTypeRow() {
  const id  = `new_${++newShiftCount}`;
  const div = document.createElement('div');
  div.className = 'form-grid form-grid-3';
  div.style.marginBottom = '10px';
  div.dataset.id = id;
  div.innerHTML = `
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" class="form-input st-name" placeholder="e.g. Evening">
    </div>
    <div class="form-group">
      <label class="form-label">Start</label>
      <input type="time" class="form-input st-start">
    </div>
    <div class="form-group">
      <label class="form-label">End</label>
      <input type="time" class="form-input st-end">
    </div>
    <div class="form-group" style="grid-column:1/-1;display:flex;justify-content:flex-end;">
      <button class="btn btn-danger btn-sm" onclick="this.closest('[data-id]').remove()">
        <i class="fas fa-times"></i> Remove
      </button>
    </div>
  `;
  document.getElementById('new-shift-rows').appendChild(div);
}

async function deleteShiftType(id, btn) {
  try {
    const { error } = await db.from('shift_types').delete().eq('id', id);
    if (error) throw error;
    btn.closest('[data-id]').remove();
    allShiftTypes = allShiftTypes.filter(s => s.id !== id);
    showToast('Shift type deleted', 'warning');
  } catch(e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

async function saveShiftTypes() {
  try {
    // Update existing
    const existing = document.querySelectorAll('#shift-types-list [data-id]');
    for (const row of existing) {
      const id    = row.dataset.id;
      const name  = row.querySelector('.st-name').value.trim();
      const start = row.querySelector('.st-start').value;
      const end   = row.querySelector('.st-end').value;
      if (!name || !start || !end) continue;
      await db.from('shift_types').update({ name, start_time:start, end_time:end }).eq('id', id);
    }

    // Insert new
    const newRows = document.querySelectorAll('#new-shift-rows [data-id]');
    const toInsert = [];
    for (const row of newRows) {
      const name  = row.querySelector('.st-name').value.trim();
      const start = row.querySelector('.st-start').value;
      const end   = row.querySelector('.st-end').value;
      if (!name || !start || !end) continue;
      toInsert.push({ name, start_time:start, end_time:end, is_active:true });
    }
    if (toInsert.length) {
      await db.from('shift_types').insert(toInsert);
    }

    await loadShiftTypes();
    showToast('Shift types saved!', 'success');
    renderShiftTypesPanel();
    if (currentWeek) loadScheduleGrid();

  } catch(e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

// ── Summary ──

  const summary  = document.getElementById('shift-summary');

    <span class="day-count-item" style="background:rgba(139,92,246,0.1);color:#8B5CF6;">🏖️ Leave: ${totalLeave}</span>
    <span class="day-count-item" style="background:rgba(212,175,55,0.1);color:var(--gold);">👥 Agents: ${allAgents.length}</span>

function buildCountRow(dates) {
  let html = `<div style="display:flex;padding:8px 16px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap;">
    <span style="font-size:11px;color:var(--muted);font-weight:700;min-width:140px;">Daily Count:</span>`;

  dates.forEach(d => {
    const dayEntries = Object.entries(scheduleData)
      .filter(([k]) => k.endsWith('_' + d.iso));
    const working = dayEntries.filter(([,v]) => v.day_type === 'Work').length;
    html += `<span style="font-size:11px;min-width:80px;text-align:center;">
      <span style="color:#10B981;font-weight:700;">${working}</span>
      <span style="color:var(--muted);"> working</span>
    </span>`;
  });
  html += `</div>`;
  return html;
}

// ── Helpers ──
function getWeekDates(start, end) {
  const dates = [];
  const days  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cur = new Date(start + 'T00:00:00');
  const endDate = new Date(end + 'T00:00:00');
  while (cur <= endDate) {
    const iso = cur.toISOString().split('T')[0];
    dates.push({
      iso,
      dayName: days[cur.getDay()],
      display: `${String(cur.getDate()).padStart(2,'0')}/${String(cur.getMonth()+1).padStart(2,'0')}`
    });
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

function getNextSunday() {
  const d = new Date();
  const day = d.getDay();
  const diff = 7 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

function formatDateShort(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`;
}

function formatDateFull(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function formatTime(t) {
  if (!t) return '—';
  return t.substring(0,5);
}

function openModal(title, msg, onConfirm) {
  document.getElementById('modal-title').innerText = title;
  document.getElementById('modal-msg').innerText   = msg;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').onclick = () => { closeModal(); onConfirm(); };
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function openPanel() {
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('slide-panel').classList.add('open');
}
function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('slide-panel').classList.remove('open');
}

loadAll();
