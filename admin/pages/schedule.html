<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOS Admin — Schedule</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
.sched-table { width:100%; border-collapse:collapse; font-size:12px; }
.sched-table th {
  padding:10px 8px; background:var(--surface2);
  color:var(--muted); font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:1px;
  border-bottom:1px solid var(--border);
  text-align:center; white-space:nowrap;
}
.sched-table th.agent-col { text-align:left; min-width:140px; }
.sched-table td {
  padding:6px 6px; border-bottom:1px solid var(--border);
  border-right:1px solid var(--border); text-align:center; vertical-align:middle;
}
.sched-table td.agent-col { text-align:left; padding:8px 12px; font-weight:700; font-size:13px; background:var(--surface2); }
.sched-table tr:last-child td { border-bottom:none; }
.shift-select {
  width:100%; padding:6px 4px;
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:8px; color:var(--text);
  font-size:11px; font-family:'Plus Jakarta Sans',sans-serif;
  font-weight:700;
  outline:none; cursor:pointer; transition:all 0.2s; text-align:center;
}
.shift-select:focus { border-color:var(--gold); background:var(--surface3); }
.shift-select.is-off              { color:var(--muted); }
.shift-select.is-work             { color:#10B981; border-color:rgba(16,185,129,0.3); background:rgba(16,185,129,0.05); }
.shift-select.is-annual           { color:#8B5CF6; border-color:rgba(139,92,246,0.3); background:rgba(139,92,246,0.05); }
.shift-select.is-sick             { color:#EF4444; border-color:rgba(239,68,68,0.3);  background:rgba(239,68,68,0.05); }
.shift-select.is-casual           { color:#F59E0B; border-color:rgba(245,158,11,0.3); background:rgba(245,158,11,0.05); }
.shift-select.is-ph               { color:#3B82F6; border-color:rgba(59,130,246,0.3); background:rgba(59,130,246,0.05); }
.shift-select.is-shift-afternoon  { color:#3B82F6; border-color:rgba(59,130,246,0.3);  background:rgba(59,130,246,0.05); }
.shift-select.is-shift-evening    { color:#F4D03F; border-color:rgba(244,208,63,0.3); background:rgba(244,208,63,0.05); }
.shift-select.is-shift-night      { color:#F59E0B; border-color:rgba(245,158,11,0.3); background:rgba(245,158,11,0.05); }
.day-header { display:flex; flex-direction:column; align-items:center; gap:2px; }
.day-name   { font-size:11px; font-weight:700; color:var(--text); }
.day-date   { font-size:10px; color:var(--muted); }
.day-today  { color:var(--gold) !important; }
.week-tab {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:10px; cursor:pointer;
  border:1.5px solid var(--border); background:var(--surface2);
  color:var(--muted); font-size:12px; font-weight:600;
  transition:all 0.2s; white-space:nowrap;
}
.week-tab:hover  { border-color:var(--border2); color:var(--text); }
.week-tab.active { border-color:var(--gold); color:var(--gold); background:rgba(212,175,55,0.08); }
.week-tab .wk-status { font-size:9px; padding:2px 7px; border-radius:20px; }
.count-badge { display:inline-flex; align-items:center; justify-content:center; min-width:20px; height:20px; padding:0 6px; border-radius:10px; font-size:10px; font-weight:700; background:rgba(212,175,55,0.1); color:var(--gold); }
.day-count-item { font-size:9px; font-weight:700; padding:2px 6px; border-radius:6px; }

/* ── Closed Week Banner ── */
.closed-banner {
  background: rgba(239,68,68,0.06);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* ── Draft Requests Banner ── */
.requests-banner {
  background: rgba(212,175,55,0.04);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.req-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  color: #10B981;
  cursor: pointer;
  transition: all 0.2s;
}
.req-pill:hover { background: rgba(16,185,129,0.2); }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title">Schedule</div>
        <div class="breadcrumb"><i class="fas fa-circle" style="font-size:5px;color:var(--gold)"></i> Weekly Management</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Export</button>
        <button class="btn btn-ghost" onclick="openShiftTypesPanel()"><i class="fas fa-sliders-h"></i> Shift Types</button>
        <button class="btn btn-ghost" onclick="openTemplatePanel()"><i class="fas fa-clone"></i> Templates</button>
        <button class="btn btn-primary" onclick="openNewWeekPanel()"><i class="fas fa-plus"></i> New Week</button>
        <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <div class="admin-chip">
          <div class="admin-avatar" id="admin-avatar">KR</div>
          <span class="admin-name" id="admin-name">Admin</span>
        </div>
      </div>
    </div>

    <div class="page-content">

      <div class="section-card fade-up" style="margin-bottom:16px;">
        <div class="section-header">
          <div class="section-title"><i class="fas fa-calendar-week" style="color:var(--gold)"></i> Weeks</div>
          <div style="font-size:12px;color:var(--muted);" id="week-count">Loading...</div>
        </div>
        <div style="padding:12px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);">
          <select id="filter-year" class="form-input" style="width:110px;font-size:12px;" onchange="filterWeekTabs()">
            <option value="">All Years</option>
          </select>
          <select id="filter-month" class="form-input" style="width:130px;font-size:12px;" onchange="filterWeekTabs()">
            <option value="">All Months</option>
            <option value="01">January</option><option value="02">February</option>
            <option value="03">March</option><option value="04">April</option>
            <option value="05">May</option><option value="06">June</option>
            <option value="07">July</option><option value="08">August</option>
            <option value="09">September</option><option value="10">October</option>
            <option value="11">November</option><option value="12">December</option>
          </select>
          <select id="filter-week" class="form-input" style="width:220px;font-size:12px;" onchange="selectWeek(this.value)">
            <option value="">— Select a week —</option>
          </select>
        </div>
        <div style="padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;" id="weeks-tabs"></div>
      </div>

      <div class="section-card fade-up" id="schedule-card" style="display:none;">
        <div class="section-header">
          <div class="section-title"><i class="fas fa-table" style="color:var(--gold)"></i> <span id="sched-week-title">Week Schedule</span></div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span id="sched-status-badge"></span>
            <button class="btn btn-ghost btn-sm" onclick="exportScheduleAsPNG()" id="copy-btn">
              <i class="fas fa-image"></i> Save as Image
            </button>
            <button class="btn btn-ghost btn-sm" onclick="saveSchedule()" id="save-btn"><i class="fas fa-save"></i> Save</button>
            <button class="btn btn-success btn-sm" onclick="publishWeek()" id="publish-btn"><i class="fas fa-globe"></i> Publish</button>
            <button class="btn btn-sm" onclick="closeWeek()" id="close-btn"
              style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#EF4444;">
              <i class="fas fa-lock"></i> Close
            </button>
            <button class="btn btn-danger btn-sm" onclick="deleteWeek()" id="delete-btn"><i class="fas fa-trash"></i> Delete</button>
          </div>
        </div>

        <!-- Closed Week Banner -->
        <div id="closed-banner" style="display:none; padding:12px 16px; border-bottom:1px solid var(--border);">
          <div class="closed-banner">
            <i class="fas fa-lock" style="color:#EF4444;font-size:16px;flex-shrink:0;"></i>
            <span style="font-size:13px;font-weight:700;color:var(--text);">This week is Closed — editing is locked.</span>
            <button class="btn btn-ghost btn-sm" onclick="reopenWeek()" style="margin-right:auto;">
              <i class="fas fa-lock-open"></i> Reopen for Editing
            </button>
          </div>
        </div>

        <!-- Draft Requests Banner -->
        <div id="requests-banner" style="display:none; padding:12px 16px; border-bottom:1px solid var(--border);">
          <div class="requests-banner">
            <i class="fas fa-inbox" style="color:var(--gold);font-size:16px;flex-shrink:0;"></i>
            <span style="font-size:13px;font-weight:700;color:var(--text);">Agents Requests :</span>
            <div id="requests-pills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
            <span id="requests-empty" style="font-size:12px;color:var(--muted);display:none;">No New Req.</span>
          </div>
        </div>

        <div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;" id="shift-summary"></div>
        <div class="section-body no-pad">
          <div class="table-wrap"><div id="schedule-grid"></div></div>
        </div>
      </div>

      <div id="no-week-selected" class="section-card fade-up">
        <div class="empty-state" style="padding:60px;">
          <span class="empty-icon">📅</span>
          <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;">No Week Selected</div>
          <div style="margin-bottom:16px;">Select a week from above or create a new one</div>
          <button class="btn btn-primary" onclick="openNewWeekPanel()"><i class="fas fa-plus"></i> Create New Week</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="slide-panel" id="slide-panel">
  <div class="panel-header">
    <div class="panel-title" id="panel-title">New Week</div>
    <button class="panel-close" onclick="closePanel()"><i class="fas fa-times"></i></button>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-footer" id="panel-footer"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Confirm</div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
renderSidebar();
applyThemeIcon();
const session = checkAuth();
if (session) {
  document.getElementById('admin-name').innerText = session.username||'Admin';
  document.getElementById('admin-avatar').innerText = initials(session.username||'Admin');
}

let allWeeks      = [];
let allAgents     = [];
let allShiftTypes = [];
let currentWeek   = null;
let scheduleData  = {};
let unsaved       = false;
let draftRequests = {};

const TODAY = new Date().toISOString().split('T')[0];

// ── Emoji Palette ──
const MORNING_EMOJI = '🟢';
const SHIFT_PALETTE = ['🔵','🟠','🟣','🔴','🟡','🩵','🟤','⚫'];
const shiftEmojiMap = {};
let paletteIndex = 0;

function getShiftEmoji(startTime) {
  if (!startTime) return '⭕';
  const hour = parseInt(startTime.substring(0,2));
  if (hour < 12) return MORNING_EMOJI;
  const key = startTime.substring(0,5);
  if (!shiftEmojiMap[key]) {
    shiftEmojiMap[key] = SHIFT_PALETTE[paletteIndex % SHIFT_PALETTE.length];
    paletteIndex++;
  }
  return shiftEmojiMap[key];
}

async function loadAll() {
  await Promise.all([loadAgents(), loadShiftTypes(), loadWeeks()]);
}

async function loadAgents() {
  const { data } = await db.from('agents').select('id,formal_name,xcally_id').eq('status','Active').order('formal_name');
  allAgents = data || [];
}

async function loadShiftTypes() {
  const { data } = await db.from('shift_types').select('*').eq('is_active',true).order('start_time');
  allShiftTypes = data || [];
}

async function loadWeeks() {
  const { data } = await db.from('schedule_weeks').select('*').order('week_start', { ascending: false });
  allWeeks = data || [];
  renderWeekTabs();
}

function renderWeekTabs() {
  document.getElementById('week-count').innerText = `${allWeeks.length} week(s)`;
  const years = [...new Set(allWeeks.map(w => w.week_start.substring(0,4)))].sort().reverse();
  const yearEl = document.getElementById('filter-year');
  const curYear = yearEl.value;
  yearEl.innerHTML = '<option value="">All Years</option>' +
    years.map(y => `<option value="${y}" ${curYear===y?'selected':''}>${y}</option>`).join('');
  filterWeekTabs();
}

function filterWeekTabs() {
  const year  = document.getElementById('filter-year').value;
  const month = document.getElementById('filter-month').value;
  const filtered = allWeeks.filter(w => {
    if (year  && !w.week_start.startsWith(year))        return false;
    if (month && w.week_start.substring(5,7) !== month) return false;
    return true;
  });
  const weekEl = document.getElementById('filter-week');
  weekEl.innerHTML = '<option value="">— Select a week —</option>' +
    filtered.map(w => `<option value="${w.id}" ${currentWeek?.id===w.id?'selected':''}>
      ${formatDateShort(w.week_start)} → ${formatDateShort(w.week_end)} (${w.status})
    </option>`).join('');
  const container = document.getElementById('weeks-tabs');
  if (!filtered.length) { container.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:8px;">No weeks found.</div>`; return; }
  const statusColor = { Draft:'badge-muted', Open:'badge-warning', Published:'badge-success', Closed:'badge-danger' };
  container.innerHTML = filtered.map(w => `
    <div class="week-tab ${currentWeek?.id === w.id ? 'active' : ''}" onclick="selectWeek('${w.id}')">
      <i class="fas fa-calendar-week" style="font-size:12px;"></i>
      <div>
        <div style="font-size:12px;font-weight:700;">${formatDateShort(w.week_start)} → ${formatDateShort(w.week_end)}</div>
        <div style="font-size:10px;color:var(--muted);">${w.note || ''}</div>
      </div>
      <span class="badge ${statusColor[w.status]||'badge-muted'} wk-status">${w.status}</span>
    </div>
  `).join('');
}

async function selectWeek(weekId) {
  if (unsaved) { const go = confirm('You have unsaved changes. Discard?'); if (!go) return; unsaved = false; }
  currentWeek = allWeeks.find(w => w.id === weekId);
  renderWeekTabs();
  document.getElementById('no-week-selected').style.display = 'none';
  document.getElementById('schedule-card').style.display    = 'block';
  await loadScheduleGrid();
}

// ── CLOSE WEEK ──
async function closeWeek() {
  if (!currentWeek) return;
  if (currentWeek.status === 'Closed') { showToast('Week is already closed', 'info'); return; }
  openModal(
    'Close Week',
    `Close week "${formatDateShort(currentWeek.week_start)} → ${formatDateShort(currentWeek.week_end)}"?\n\nThe week will be locked — editing will require reopening it.`,
    async () => {
      try {
        await db.from('schedule_weeks').update({ status: 'Closed' }).eq('id', currentWeek.id);
        currentWeek.status = 'Closed';
        showToast('Week closed and locked!', 'success');
        await loadWeeks();
        updateWeekUI();
      } catch(e) { showToast('Failed: ' + e.message, 'error'); }
    }
  );
}

// ── REOPEN WEEK ──
async function reopenWeek() {
  if (!currentWeek) return;
  openModal(
    'Reopen Week',
    `Reopen "${formatDateShort(currentWeek.week_start)} → ${formatDateShort(currentWeek.week_end)}" for editing?\n\nStatus will be changed back to Published.`,
    async () => {
      try {
        await db.from('schedule_weeks').update({ status: 'Published' }).eq('id', currentWeek.id);
        currentWeek.status = 'Published';
        showToast('Week reopened for editing!', 'success');
        await loadWeeks();
        updateWeekUI();
      } catch(e) { showToast('Failed: ' + e.message, 'error'); }
    }
  );
}

// ── UPDATE UI BASED ON WEEK STATUS ──
function updateWeekUI() {
  const isClosed = currentWeek?.status === 'Closed';
  const statusColor = { Draft:'badge-muted', Open:'badge-warning', Published:'badge-success', Closed:'badge-danger' };

  document.getElementById('sched-status-badge').innerHTML =
    `<span class="badge ${statusColor[currentWeek.status]||'badge-muted'}">${currentWeek.status}</span>`;

  // Show/hide closed banner
  document.getElementById('closed-banner').style.display = isClosed ? 'block' : 'none';

  // Disable/enable editing controls
  document.getElementById('save-btn').disabled    = isClosed;
  document.getElementById('publish-btn').disabled = isClosed;
  document.getElementById('close-btn').style.display = isClosed ? 'none' : 'flex';

  // Disable all selects if closed
  document.querySelectorAll('.shift-select').forEach(sel => {
    sel.disabled = isClosed;
    sel.style.opacity = isClosed ? '0.6' : '1';
    sel.style.cursor  = isClosed ? 'not-allowed' : 'pointer';
  });
}

// ── Load Draft Requests ──
async function loadDraftRequests() {
  draftRequests = {};
  if (!currentWeek) return;
  try {
    const { data } = await db.from('requests').select('*').eq('type', 'Schedule Request').eq('status', 'Pending');
    const banner  = document.getElementById('requests-banner');
    const pillsEl = document.getElementById('requests-pills');
    const emptyEl = document.getElementById('requests-empty');

    const weekReqs = (data||[]).filter(r => {
      try { const det = JSON.parse(r.details); return det.week_id === currentWeek.id; } catch(e) { return false; }
    });

    if (currentWeek.status === 'Draft' || currentWeek.status === 'Open') {
      banner.style.display = 'block';
    } else {
      banner.style.display = 'none'; return;
    }

    if (!weekReqs.length) {
      pillsEl.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }

    emptyEl.style.display = 'none';
    pillsEl.innerHTML = '';

    weekReqs.forEach(req => {
      try {
        const det   = JSON.parse(req.details);
        const agent = allAgents.find(a => a.id === req.agent_id);
        const name  = agent?.formal_name || req.agent_name || 'Unknown';
        draftRequests[req.agent_id] = det.draft || {};
        const pill = document.createElement('div');
        pill.className = 'req-pill';
        pill.innerHTML = `<i class="fas fa-user" style="font-size:10px;"></i> ${name}`;
        pill.onclick = () => applyAgentRequest(req.agent_id, det.draft || {}, name);
        pillsEl.appendChild(pill);
      } catch(e) {}
    });
  } catch(e) { console.error(e); }
}

function applyAgentRequest(agentId, draft, agentName) {
  let applied = 0;
  Object.entries(draft).forEach(([date, entry]) => {
    const val = entry.day_type === 'Work' && entry.shift_type_id ? `Work__${entry.shift_type_id}` : entry.day_type;
    const sel = document.querySelector(`select[data-agent="${agentId}"][data-date="${date}"]`);
    if (sel) { sel.value = val; onShiftChange(sel); applied++; }
  });
  if (applied > 0) {
    showToast('Applied ' + agentName + '\'s request — Press Save', 'success');
  } else {
    showToast('No changes applied', 'warning');
  }
}

// ── Load Schedule Grid ──
async function loadScheduleGrid() {
  if (!currentWeek) return;
  Object.keys(shiftEmojiMap).forEach(k => delete shiftEmojiMap[k]);
  paletteIndex = 0;

  const gridEl = document.getElementById('schedule-grid');
  gridEl.innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;

  document.getElementById('sched-week-title').innerText =
    `${formatDateFull(currentWeek.week_start)}  →  ${formatDateFull(currentWeek.week_end)}`;

  const { data: existing } = await db.from('schedule').select('*').eq('week_id', currentWeek.id);
  scheduleData = {};
  (existing || []).forEach(s => {
    let shiftTypeId = s.shift_type_id;
    if (!shiftTypeId && s.shift_time && s.day_type === 'Work') {
      const parts = s.shift_time.split(' - ');
      if (parts.length === 2) {
        const matched = allShiftTypes.find(st => st.start_time.startsWith(parts[0].trim()) && st.end_time.startsWith(parts[1].trim()));
        if (matched) shiftTypeId = matched.id;
      }
    }
    scheduleData[`${s.agent_id}_${s.shift_date}`] = { id: s.id, day_type: s.day_type, shift_type_id: shiftTypeId };
  });

  allShiftTypes.forEach(st => getShiftEmoji(st.start_time));

  const dates = getWeekDates(currentWeek.week_start, currentWeek.week_end);
  const isClosed = currentWeek.status === 'Closed';

  let html = `<table class="sched-table"><thead><tr><th class="agent-col">Agent</th>`;
  dates.forEach(d => {
    const isToday = d.iso === TODAY;
    html += `<th><div class="day-header"><span class="day-name ${isToday?'day-today':''}">${d.dayName}</span><span class="day-date ${isToday?'day-today':''}">${d.display}</span></div></th>`;
  });
  html += `</tr></thead><tbody>`;

  allAgents.forEach(agent => {
    html += `<tr><td class="agent-col"><div style="display:flex;align-items:center;gap:8px;"><div class="agent-avatar" style="width:26px;height:26px;font-size:9px;flex-shrink:0;">${initials(agent.formal_name)}</div><span>${agent.formal_name}</span></div></td>`;
    dates.forEach(d => {
      const key        = `${agent.id}_${d.iso}`;
      const entry      = scheduleData[key] || { day_type: 'Off', shift_type_id: null };
      const cls        = getSelectClass(entry.day_type, entry.shift_type_id);
      const agentDraft = draftRequests[agent.id] || {};
      const hasReq     = agentDraft[d.iso] !== undefined;
      const reqEntry   = agentDraft[d.iso] || {};
      const reqLabel   = hasReq
        ? (reqEntry.day_type === 'Work' && reqEntry.shift_type_id
            ? (() => { const st = allShiftTypes.find(s => s.id === reqEntry.shift_type_id); return st ? st.start_time.substring(0,5)+'-'+st.end_time.substring(0,5) : 'Work'; })()
            : reqEntry.day_type)
        : '';

      html += `<td style="position:relative;">
        ${hasReq ? `<div style="position:absolute;top:2px;right:2px;width:7px;height:7px;background:#10B981;border-radius:50%;z-index:1;" title="Request: ${reqLabel}"></div>` : ''}
        <select class="shift-select ${cls}" data-agent="${agent.id}" data-date="${d.iso}"
          onchange="onShiftChange(this)"
          ${isClosed ? 'disabled style="opacity:0.6;cursor:not-allowed;"' : ''}>
          ${buildShiftOptions(entry.day_type, entry.shift_type_id)}
        </select>
        ${hasReq ? `<div style="font-size:9px;color:#10B981;font-weight:700;margin-top:2px;text-align:center;">← ${reqLabel}</div>` : ''}
      </td>`;
    });
    html += `</tr>`;
  });

  html += `<tr style="background:var(--surface2);"><td class="agent-col" style="font-size:11px;color:var(--muted);font-weight:700;padding:8px 12px;">Daily Count</td>`;
  dates.forEach(d => {
    const working = Object.entries(scheduleData).filter(([k,v]) => k.endsWith('_'+d.iso) && v.day_type==='Work').length;
    html += `<td style="text-align:center;padding:8px 4px;"><span style="color:#10B981;font-weight:800;font-size:13px;">${working}</span><span style="color:var(--muted);font-size:10px;"> working</span></td>`;
  });
  html += `</tr></tbody></table>`;

  gridEl.innerHTML = html;
  updateSummary();
  updateWeekUI();
  await loadDraftRequests();
}

// ── Build Shift Options ──
function buildShiftOptions(dayType, shiftTypeId) {
  let opts = `<option value="Off" ${dayType==='Off'?'selected':''}>— Off —</option>`;
  allShiftTypes.forEach(st => {
    const val = `Work__${st.id}`;
    const sel = dayType==='Work' && shiftTypeId===st.id ? 'selected' : '';
    opts += `<option value="${val}" ${sel}>${formatTime(st.start_time)} - ${formatTime(st.end_time)} (${st.name})</option>`;
  });
  ['Annual','Sick','Casual','PH','Task'].forEach(t => { opts += `<option value="${t}" ${dayType===t?'selected':''}>${t}</option>`; });
  return opts;
}

function getSelectClass(dayType, shiftTypeId) {
  if (dayType === 'Annual') return 'is-annual';
  if (dayType === 'Sick')   return 'is-sick';
  if (dayType === 'Casual') return 'is-casual';
  if (dayType === 'PH')     return 'is-ph';
  if (dayType !== 'Work')   return 'is-off';

  if (!shiftTypeId) return 'is-work';
  const st = allShiftTypes.find(s => s.id === shiftTypeId);
  if (!st) return 'is-work';

  const hour = parseInt(st.start_time.substring(0,2));
  if (hour < 12) return 'is-work';           // Morning  → green
  if (hour < 14) return 'is-shift-afternoon'; // 12-14   → blue
  if (hour < 17) return 'is-shift-evening';   // 14-17   → yellow
  return 'is-shift-night';                    // 17+     → orange
}

function onShiftChange(sel) {
  if (currentWeek?.status === 'Closed') return;
  const agentId = sel.dataset.agent;
  const date    = sel.dataset.date;
  const val     = sel.value;
  const key     = `${agentId}_${date}`;
  let dayType = val, shiftTypeId = null;
  if (val.startsWith('Work__')) { dayType = 'Work'; shiftTypeId = val.split('__')[1]; }
  scheduleData[key] = { ...scheduleData[key], day_type: dayType, shift_type_id: shiftTypeId };
  sel.className = `shift-select ${getSelectClass(dayType, shiftTypeId)}`;
  unsaved = true;
  document.getElementById('save-btn').innerHTML = '<i class="fas fa-save"></i> Save <span style="color:var(--warning);font-size:10px;">●</span>';
}

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
  try {
    const upserts = [];
    Object.keys(scheduleData).forEach(key => {
  const lastUnderscore = key.lastIndexOf('_');
  const agentId = key.substring(0, lastUnderscore);
  const date = key.substring(lastUnderscore + 1);
      const entry = scheduleData[key];
      upserts.push({ agent_id: agentId, week_id: currentWeek.id, shift_date: date, day_type: entry.day_type, shift_type_id: entry.shift_type_id || null, status: 'Approved' });

async function publishWeek() {
  if (currentWeek?.status === 'Closed') { showToast('Week is closed — reopen it first', 'error'); return; }
  const unpublished = allWeeks.filter(w => w.id !== currentWeek.id && w.status !== 'Published' && w.status !== 'Closed' && new Date(w.week_start) < new Date(currentWeek.week_start));
  const warningMsg = unpublished.length > 0
    ? `⚠️ Warning: ${unpublished.length} older week(s) are not published yet.\n\nPublishing will make this schedule visible to all agents and auto-generate breaks. Continue?`
    : 'Publishing will make this schedule visible to all agents and auto-generate breaks. Continue?';
  openModal('Publish Week', warningMsg, async () => {
    try {
      await saveSchedule();

      if (error) throw error;

}

async function updateAnnualLeave() {
  const year      = new Date(currentWeek.week_start).getFullYear();
  const yearStart = year + '-01-01';
  const weekEnd   = currentWeek.week_end;
  const { data: leaves } = await db.from('schedule').select('agent_id, shift_date').eq('day_type', 'Annual').gte('shift_date', yearStart).lte('shift_date', weekEnd);
  const cols = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const { data: annualRecords } = await db.from('annual_leave').select('*').eq('year', year);
  const map = {};
  (leaves || []).forEach(l => {
    const month = new Date(l.shift_date + 'T00:00:00').getMonth();
    if (!map[l.agent_id]) map[l.agent_id] = {};
    map[l.agent_id][cols[month]] = (map[l.agent_id][cols[month]] || 0) + 1;
  });
  for (const agent of allAgents) {
    const agentMonths  = map[agent.id] || {};
    const annualRecord = (annualRecords || []).find(a => a.agent_id === agent.id);
    const updates = {};
    cols.forEach(m => { updates['used_' + m] = agentMonths[m] || 0; });
    updates.total_used = cols.reduce((s, m) => s + (agentMonths[m] || 0), 0);
    if (!annualRecord) {
      await db.from('annual_leave').insert({ agent_id: agent.id, agent_name: agent.formal_name, year, ...updates, entitlement: 21, carry_over: 0, remaining: 21 - updates.total_used, created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
      continue;
    }
    updates.remaining  = (annualRecord.entitlement + annualRecord.carry_over) - updates.total_used;
    updates.updated_at = new Date().toISOString();
    await db.from('annual_leave').update(updates).eq('agent_id', agent.id).eq('year', year);
  }
  showToast('Leave balance updated!', 'success');
}

async function autoGenerateBreaks() {
  const dates = getWeekDates(currentWeek.week_start, currentWeek.week_end);
  for (const d of dates) {
    const schedules = [];
    allAgents.forEach(agent => {
      const key   = agent.id + '_' + d.iso;
      const entry = scheduleData[key];
      if (!entry || entry.day_type !== 'Work') return;
      const shiftType = allShiftTypes.find(st => st.id === entry.shift_type_id);
      if (!shiftType) return;
      schedules.push({ agent_id: agent.id, shift_types: { start_time: shiftType.start_time, end_time: shiftType.end_time } });
    });
    if (!schedules.length) continue;
    const upserts = calculateBreaks(schedules, d.iso);
    if (upserts.length) {
      const { error } = await db.from('breaks').upsert(upserts, { onConflict: 'agent_id,break_date' });
      if (error) console.error('Break save error:', error);
    }
  }
}

function calculateBreaks(schedules, date) {
  const agents = schedules.filter(s => s.shift_types).map(s => ({
    agent_id:   s.agent_id,
    start_time: s.shift_types.start_time,
    end_time:   s.shift_types.end_time,
    startMins:  timeToMins(s.shift_types.start_time),
    endMins:    timeToMins(s.shift_types.end_time),
  }));
  agents.sort((a, b) => a.startMins - b.startMins);
  const usedBreak1 = new Set();
  const usedLunch  = new Set();
  const usedBreak2 = new Set();
  const upserts    = [];
  agents.forEach(agent => {
    const noBreakStart  = agent.startMins + 60;
    const noBreakEnd    = agent.endMins   - 60;
    const availableMins = noBreakEnd - noBreakStart;
    const windowThird   = Math.floor(availableMins / 3);
    const idealBreak1   = roundToQuarter(noBreakStart + Math.floor(windowThird * 0.3));
    const idealLunch    = roundToQuarter(noBreakStart + windowThird + Math.floor(windowThird * 0.3));
    const idealBreak2   = roundToQuarter(noBreakStart + windowThird * 2 + Math.floor(windowThird * 0.3));
    const b1 = findSlot(idealBreak1, noBreakStart, noBreakEnd - 15, usedBreak1);
    const ln = findSlot(idealLunch,  noBreakStart, noBreakEnd - 30, usedLunch);
    const b2 = findSlot(idealBreak2, noBreakStart, noBreakEnd - 15, usedBreak2);
    usedBreak1.add(b1); usedLunch.add(ln); usedBreak2.add(b2);
    upserts.push({
      agent_id:   agent.agent_id,
      break_date: date,
      shift_time: agent.start_time.substring(0,5) + ' - ' + agent.end_time.substring(0,5),
      break1:     minsToTime(b1),
      lunch:      minsToTime(ln),
      break2:     minsToTime(b2),
      updated_at: new Date().toISOString(),
    });
  });
  return upserts;
}

function timeToMins(t) { if(!t)return 0; const p=t.substring(0,5).split(':'); return (+p[0])*60+(+p[1]); }
function minsToTime(m) { const h=Math.floor(m/60).toString().padStart(2,'0'); const mn=(m%60).toString().padStart(2,'0'); return h+':'+mn+':00'; }
function roundToQuarter(mins) { return Math.round(mins / 15) * 15; }
function findSlot(ideal, min, max, usedSet) {
  if (!usedSet.has(ideal) && ideal >= min && ideal <= max) return ideal;
  for (let i = 15; i <= 120; i += 15) {
    const fwd = ideal + i; const bwd = ideal - i;
    if (fwd <= max && !usedSet.has(fwd)) return fwd;
    if (bwd >= min && !usedSet.has(bwd)) return bwd;
  }
  return Math.min(Math.max(ideal, min), max);
}

function getWeekDates(start, end) {
  const dates = []; const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cur = new Date(start + 'T12:00:00'); const endDate = new Date(end + 'T12:00:00');
  while (cur <= endDate) {
    const iso = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
    dates.push({ iso, dayName: days[cur.getDay()], display: String(cur.getDate()).padStart(2,'0')+'/'+String(cur.getMonth()+1).padStart(2,'0') });
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}
function getNextSunday() { const d = new Date(); d.setDate(d.getDate() + (7 - d.getDay())); return d.toISOString().split('T')[0]; }
function formatDateShort(d) { if(!d)return '—'; const dt=new Date(d+'T00:00:00'); return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0'); }
function formatDateFull(d) { if(!d)return '—'; return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function formatTime(t) { if(!t)return '—'; return t.substring(0,5); }
function openModal(title,msg,onConfirm){document.getElementById('modal-title').innerText=title;document.getElementById('modal-msg').innerText=msg;document.getElementById('modal-overlay').classList.add('open');document.getElementById('modal-confirm').onclick=()=>{closeModal();onConfirm();};}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function openPanel(){document.getElementById('panel-overlay').classList.add('open');document.getElementById('slide-panel').classList.add('open');}
function closePanel(){document.getElementById('panel-overlay').classList.remove('open');document.getElementById('slide-panel').classList.remove('open');}

function exportToExcel() {
  if (!currentWeek) { showToast('Select a week first', 'error'); return; }
  const dates = getWeekDates(currentWeek.week_start, currentWeek.week_end);
  let csv = 'Agent,' + dates.map(d => d.dayName + ' ' + d.display).join(',') + '\n';
  allAgents.forEach(agent => {
    let row = agent.formal_name;
    dates.forEach(d => {
      const key = agent.id + '_' + d.iso;
      const entry = scheduleData[key] || { day_type: 'Off' };
      if (entry.day_type === 'Work') { const st = allShiftTypes.find(s => s.id === entry.shift_type_id); row += ',' + (st ? st.start_time.substring(0,5)+'-'+st.end_time.substring(0,5) : 'Work'); }
      else { row += ',' + entry.day_type; }
    });
    csv += row + '\n';
  });
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = 'Schedule_' + currentWeek.week_start + '.csv'; a.click();
  URL.revokeObjectURL(url); showToast('Schedule exported!', 'success');
}

function openTemplatePanel() {
  if (!currentWeek) { showToast('Select a week first', 'error'); return; }
  if (currentWeek.status === 'Closed') { showToast('Week is closed — reopen it first', 'error'); return; }
  const dates = getWeekDates(currentWeek.week_start, currentWeek.week_end);
  document.getElementById('panel-title').innerText = 'Apply Shift Template';
  document.getElementById('panel-body').innerHTML = `
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">Select agent, day and shift — will be applied to the schedule.</div>
    <div class="form-grid form-grid-3" style="margin-bottom:16px;">
      <div class="form-group"><label class="form-label">Agent</label>
        <select id="tmpl-agent" class="form-input"><option value="all">All Agents</option>${allAgents.map(a=>`<option value="${a.id}">${a.formal_name}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Day</label>
        <select id="tmpl-day" class="form-input"><option value="all">All Days</option>${dates.map(d=>`<option value="${d.iso}">${d.dayName} ${d.display}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Shift</label>
        <select id="tmpl-shift" class="form-input"><option value="Off">— Off —</option>${allShiftTypes.map(st=>`<option value="Work__${st.id}">${st.start_time.substring(0,5)}-${st.end_time.substring(0,5)} (${st.name})</option>`).join('')}<option value="Annual">Annual</option><option value="Sick">Sick</option><option value="Casual">Casual</option><option value="PH">PH</option></select></div>
    </div>`;
  document.getElementById('panel-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closePanel()">Cancel</button>
    <button class="btn btn-primary" onclick="applyTemplate()"><i class="fas fa-magic"></i> Apply</button>`;
  openPanel();
}

function applyTemplate() {
  const agentFilter = document.getElementById('tmpl-agent').value;
  const dayFilter   = document.getElementById('tmpl-day').value;
  const shiftVal    = document.getElementById('tmpl-shift').value;
  const agents = agentFilter === 'all' ? allAgents : allAgents.filter(a => a.id === agentFilter);
  const dates  = getWeekDates(currentWeek.week_start, currentWeek.week_end);
  const days   = dayFilter === 'all' ? dates : dates.filter(d => d.iso === dayFilter);
  let count = 0;
  agents.forEach(agent => { days.forEach(d => { const sel = document.querySelector(`select[data-agent="${agent.id}"][data-date="${d.iso}"]`); if (sel) { sel.value = shiftVal; onShiftChange(sel); count++; } }); });
  closePanel(); showToast(`Template applied to ${count} cell(s)! Press Save.`, 'success');
}

loadAll();
</script>
</body>
