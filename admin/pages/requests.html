<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOS Admin — Requests</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="admin-layout">
  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar"></aside>
  <!-- ══ MAIN ══ -->
  <div class="main-content">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title">Requests</div>
        <div class="breadcrumb">
          <i class="fas fa-circle" style="font-size:5px;color:var(--gold)"></i>
          Manage Team Requests
        </div>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" onclick="loadRequests()" title="Refresh">
          <i class="fas fa-sync-alt"></i>
        </button>
        <div class="admin-chip">
          <div class="admin-avatar" id="admin-avatar">KR</div>
          <span class="admin-name" id="admin-name">Admin</span>
        </div>
      </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <!-- KPI CARDS -->
      <div class="kpi-grid fade-up" style="grid-template-columns:repeat(5,1fr);">
        <div class="kpi-card gold">
          <span class="kpi-icon">📋</span>
          <div class="kpi-label">Total</div>
          <div class="kpi-value" id="k-total">—</div>
        </div>
        <div class="kpi-card orange">
          <span class="kpi-icon">⏳</span>
          <div class="kpi-label">Pending</div>
          <div class="kpi-value" id="k-pending">—</div>
        </div>
        <div class="kpi-card green">
          <span class="kpi-icon">✅</span>
          <div class="kpi-label">Approved</div>
          <div class="kpi-value" id="k-approved">—</div>
        </div>
        <div class="kpi-card red">
          <span class="kpi-icon">❌</span>
          <div class="kpi-label">Rejected</div>
          <div class="kpi-value" id="k-rejected">—</div>
        </div>
        <div class="kpi-card blue">
          <span class="kpi-icon">📅</span>
          <div class="kpi-label">Today</div>
          <div class="kpi-value" id="k-today">—</div>
        </div>
      </div>

      <!-- FILTERS + TABLE -->
      <div class="section-card fade-up">
        <div class="section-header">
          <div class="section-title">
            <i class="fas fa-file-alt" style="color:var(--gold)"></i>
            All Requests
          </div>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <!-- Search -->
            <div class="search-wrap" style="min-width:200px;">
              <i class="fas fa-search"></i>
              <input type="text" class="search-input" placeholder="Search agent..." oninput="filterRequests(this.value)">
            </div>
            <!-- Filter Type -->
            <select class="form-input" style="width:auto;padding:8px 12px;" onchange="filterByType(this.value)">
              <option value="">All Types</option>
              <option value="Excuse">Excuse</option>
              <option value="Time Off">Time Off</option>
              <option value="Missing Punch">Missing Punch</option>
              <option value="Shift Swap">Shift Swap</option>
              <option value="Break Change">Break Change</option>
            </select>
            <!-- Filter Status -->
            <select class="form-input" style="width:auto;padding:8px 12px;" onchange="filterByStatus(this.value)">
              <option value="">All Status</option>
              <option value="Pending">Pending</option>
              <option value="Approved">Approved</option>
              <option value="Rejected">Rejected</option>
            </select>
            <!-- Bulk Actions -->
            <button class="btn btn-success btn-sm" onclick="bulkApprove()" id="bulk-approve-btn" style="display:none;">
              <i class="fas fa-check"></i> Approve Selected
            </button>
            <button class="btn btn-danger btn-sm" onclick="bulkReject()" id="bulk-reject-btn" style="display:none;">
              <i class="fas fa-times"></i> Reject Selected
            </button>
          </div>
        </div>
        <div class="section-body no-pad">
          <div class="table-wrap">
            <table class="nos-table">
              <thead>
                <tr>
                  <th style="width:40px;">
                    <input type="checkbox" id="select-all" onchange="toggleSelectAll(this)">
                  </th>
                  <th>Agent</th>
                  <th>Type</th>
                  <th>Details</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="requests-tbody">
                <tr><td colspan="7"><div class="loading-wrap"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="slide-panel" id="slide-panel">
  <div class="panel-header">
    <div class="panel-title" id="panel-title">Request Details</div>
    <button class="panel-close" onclick="closePanel()"><i class="fas fa-times"></i></button>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-footer" id="panel-footer"></div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Confirm</div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
renderSidebar();
const session = checkAuth();
if (session) {
  document.getElementById('admin-name').innerText = session.username||'Admin';
  document.getElementById('admin-avatar').innerText = initials(session.username||'Admin');
}
let allRequests  = [];
let filterSearch = '';
let filterType   = '';
let filterStatus = '';
let selectedIds  = new Set();

const TODAY = new Date().toISOString().split('T')[0];

const TYPE_ICONS = {
  'Excuse':        'fa-exclamation-circle',
  'Time Off':      'fa-calendar-check',
  'Missing Punch': 'fa-fingerprint',
  'Shift Swap':    'fa-exchange-alt',
  'Break Change':  'fa-coffee'
};

const TYPE_COLORS = {
  'Excuse':        'badge-warning',
  'Time Off':      'badge-purple',
  'Missing Punch': 'badge-danger',
  'Shift Swap':    'badge-info',
  'Break Change':  'badge-gold'
};

// ── Load Requests ──
async function loadRequests() {
  const tbody = document.getElementById('requests-tbody');
  tbody.innerHTML = `<tr><td colspan="7"><div class="loading-wrap"><div class="spinner"></div></div></td></tr>`;

  try {
    const { data, error } = await db.from('requests')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) throw error;
    allRequests = data || [];
    updateKPIs();
    renderTable();
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><span class="empty-icon">❌</span>Failed to load</div></td></tr>`;
    showToast('Failed: ' + e.message, 'error');
  }
}

// ── KPIs ──
function updateKPIs() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('k-total').innerText    = allRequests.length;
  document.getElementById('k-pending').innerText  = allRequests.filter(r=>r.status==='Pending').length;
  document.getElementById('k-approved').innerText = allRequests.filter(r=>r.status==='Approved').length;
  document.getElementById('k-rejected').innerText = allRequests.filter(r=>r.status==='Rejected').length;
  document.getElementById('k-today').innerText    = allRequests.filter(r=>r.created_at?.startsWith(today)).length;
}

// ── Render Table ──
function renderTable() {
  const tbody = document.getElementById('requests-tbody');
  let filtered = allRequests;

  if (filterSearch) {
    const q = filterSearch.toLowerCase();
    filtered = filtered.filter(r => r.agent_name?.toLowerCase().includes(q));
  }
  if (filterType)   filtered = filtered.filter(r => r.type   === filterType);
  if (filterStatus) filtered = filtered.filter(r => r.status === filterStatus);

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><span class="empty-icon">📭</span>No requests found</div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(r => {
    const details = formatDetails(r);
    const isSelected = selectedIds.has(r.id);

    return `
      <tr style="${r.status==='Pending'?'background:rgba(245,158,11,0.03)':''}">
        <td>
          <input type="checkbox" class="row-check" value="${r.id}"
            ${isSelected?'checked':''} onchange="toggleSelect(this)">
        </td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="agent-avatar" style="width:28px;height:28px;font-size:10px;flex-shrink:0;">
              ${initials(r.agent_name)}
            </div>
            <span style="font-weight:700;font-size:13px;">${r.agent_name || '—'}</span>
          </div>
        </td>
        <td>
          <span class="badge ${TYPE_COLORS[r.type]||'badge-muted'}">
            <i class="fas ${TYPE_ICONS[r.type]||'fa-file'}" style="margin-right:4px;"></i>
            ${r.type}
          </span>
        </td>
        <td style="font-size:12px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          ${details}
        </td>
        <td style="font-size:12px;color:var(--muted);white-space:nowrap;">
          ${formatDateTime(r.created_at)}
        </td>
        <td>${statusBadge(r.status)}</td>
        <td>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-info btn-sm btn-icon" onclick="viewRequest('${r.id}')" title="Details">
              <i class="fas fa-eye"></i>
            </button>
            ${r.status === 'Pending' ? `
              <button class="btn btn-success btn-sm btn-icon" onclick="updateStatus('${r.id}','Approved')" title="Approve">
                <i class="fas fa-check"></i>
              </button>
              <button class="btn btn-danger btn-sm btn-icon" onclick="updateStatus('${r.id}','Rejected')" title="Reject">
                <i class="fas fa-times"></i>
              </button>
            ` : `
              <button class="btn btn-ghost btn-sm btn-icon" onclick="updateStatus('${r.id}','Pending')" title="Reset to Pending">
                <i class="fas fa-undo"></i>
              </button>
            `}
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

// ── Format Details ──
function formatDetails(r) {
  if (!r.details) return '—';
  try {
    const d = typeof r.details === 'string' ? JSON.parse(r.details) : r.details;
    if (r.type === 'Time Off')      return `${d.request_type || ''} · ${d.from_date||''} → ${d.to_date||''}`;
    if (r.type === 'Excuse')        return `${d.excuse_type||''} · ${d.date||''}`;
    if (r.type === 'Missing Punch') return `Date: ${d.date||''}`;
    if (r.type === 'Shift Swap')    return `${d.date||''} · with ${d.colleague||''}`;
    if (r.type === 'Break Change')  return `${d.break_type||''} → ${d.requested_time||''}`;
    return JSON.stringify(d).slice(0,60);
  } catch { return String(r.details).slice(0,60); }
}

// ── View Request Detail ──
function viewRequest(id) {
  const r = allRequests.find(x => x.id === id);
  if (!r) return;

  let detailHtml = '';
  try {
    const d = typeof r.details === 'string' ? JSON.parse(r.details) : (r.details || {});
    detailHtml = Object.entries(d).map(([k,v]) => `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);">${k.replace(/_/g,' ')}</span>
        <span style="font-size:13px;font-weight:600;color:var(--text);">${v||'—'}</span>
      </div>
    `).join('');
  } catch { detailHtml = `<p>${r.details}</p>`; }

  document.getElementById('panel-title').innerText = `${r.type} — ${r.agent_name}`;
  document.getElementById('panel-body').innerHTML = `
    <!-- Status Badge -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      ${statusBadge(r.status)}
      <span style="font-size:12px;color:var(--muted);">${formatDateTime(r.created_at)}</span>
    </div>

    <!-- Agent Info -->
    <div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--surface2);border-radius:12px;margin-bottom:16px;">
      <div class="agent-avatar" style="width:42px;height:42px;font-size:14px;">
        ${initials(r.agent_name)}
      </div>
      <div>
        <div style="font-weight:800;font-size:14px;">${r.agent_name || '—'}</div>
        <span class="badge ${TYPE_COLORS[r.type]||'badge-muted'}" style="margin-top:4px;">
          <i class="fas ${TYPE_ICONS[r.type]||'fa-file'}" style="margin-right:4px;"></i>${r.type}
        </span>
      </div>
    </div>

    <!-- Details -->
    <div style="font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;">
      Request Details
    </div>
    <div style="background:var(--surface2);border-radius:12px;padding:12px 16px;margin-bottom:16px;">
      ${detailHtml || '<div style="color:var(--muted);font-size:13px;">No details available</div>'}
    </div>

    <!-- Admin Note -->
    <div class="form-group">
      <label class="form-label">Admin Note (Optional)</label>
      <textarea id="admin-note" class="form-input" rows="3" placeholder="Add a note for the agent...">${r.admin_note||''}</textarea>
    </div>
  `;

  document.getElementById('panel-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closePanel()">Close</button>
    ${r.status === 'Pending' ? `
      <button class="btn btn-danger" onclick="updateStatusFromPanel('${r.id}','Rejected')">
        <i class="fas fa-times"></i> Reject
      </button>
      <button class="btn btn-success" onclick="updateStatusFromPanel('${r.id}','Approved')">
        <i class="fas fa-check"></i> Approve
      </button>
    ` : `
      <button class="btn btn-ghost" onclick="updateStatusFromPanel('${r.id}','Pending')">
        <i class="fas fa-undo"></i> Reset to Pending
      </button>
    `}
  `;

  openPanel();
}

// ── Update Status ──
async function updateStatus(id, newStatus) {
  try {
    const { error } = await db.from('requests')
      .update({ status: newStatus, updated_at: new Date().toISOString() })
      .eq('id', id);
    if (error) throw error;

    const req = allRequests.find(r => r.id === id);
    if (req) req.status = newStatus;

    const color = newStatus==='Approved' ? 'success' : newStatus==='Rejected' ? 'error' : 'info';
    showToast(`Request ${newStatus.toLowerCase()}!`, color);
    updateKPIs();
    renderTable();
  } catch(e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

async function updateStatusFromPanel(id, newStatus) {
  const note = document.getElementById('admin-note')?.value.trim();
  try {
    const { error } = await db.from('requests')
      .update({ status: newStatus, admin_note: note || null, updated_at: new Date().toISOString() })
      .eq('id', id);
    if (error) throw error;

    const req = allRequests.find(r => r.id === id);
    if (req) { req.status = newStatus; req.admin_note = note; }

    const color = newStatus==='Approved' ? 'success' : newStatus==='Rejected' ? 'error' : 'info';
    showToast(`Request ${newStatus.toLowerCase()}!`, color);
    closePanel();
    updateKPIs();
    renderTable();
  } catch(e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

// ── Bulk Actions ──
function toggleSelect(cb) {
  if (cb.checked) selectedIds.add(cb.value);
  else selectedIds.delete(cb.value);
  updateBulkButtons();
}

function toggleSelectAll(cb) {
  document.querySelectorAll('.row-check').forEach(c => {
    c.checked = cb.checked;
    if (cb.checked) selectedIds.add(c.value);
    else selectedIds.delete(c.value);
  });
  updateBulkButtons();
}

function updateBulkButtons() {
  const show = selectedIds.size > 0;
  document.getElementById('bulk-approve-btn').style.display = show ? 'inline-flex' : 'none';
  document.getElementById('bulk-reject-btn').style.display  = show ? 'inline-flex' : 'none';
}

async function bulkApprove() {
  if (!selectedIds.size) return;
  openModal('Approve Selected', `Approve ${selectedIds.size} request(s)?`, async () => {
    for (const id of selectedIds) await updateStatus(id, 'Approved');
    selectedIds.clear();
    updateBulkButtons();
    document.getElementById('select-all').checked = false;
  });
}

async function bulkReject() {
  if (!selectedIds.size) return;
  openModal('Reject Selected', `Reject ${selectedIds.size} request(s)?`, async () => {
    for (const id of selectedIds) await updateStatus(id, 'Rejected');
    selectedIds.clear();
    updateBulkButtons();
    document.getElementById('select-all').checked = false;
  });
}

// ── Filters ──
function filterRequests(q) { filterSearch = q; renderTable(); }
function filterByType(v)    { filterType   = v; renderTable(); }
function filterByStatus(v)  { filterStatus = v; renderTable(); }

// ── Helpers ──
function formatDateTime(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' +
         dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function openModal(title, msg, onConfirm) {
  document.getElementById('modal-title').innerText = title;
  document.getElementById('modal-msg').innerText   = msg;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-confirm').onclick = () => { closeModal(); onConfirm(); };
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function openPanel()  {
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('slide-panel').classList.add('open');
}
function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('slide-panel').classList.remove('open');
}

// ── Start ──
loadRequests();
</script>

</body>
</html>
