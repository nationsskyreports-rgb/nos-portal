<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOS Admin — Login</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #D4AF37;
  --gold-light: #F4D03F;
  --gold-grad: linear-gradient(135deg, #D4AF37 0%, #F4D03F 50%, #D4AF37 100%);
  --bg: #080C14;
  --surface: #0E1420;
  --surface2: #141C2E;
  --border: rgba(212,175,55,0.15);
  --text: #F0F4FF;
  --muted: #6B7A99;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
  overflow-y: auto;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(212,175,55,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(212,175,55,0.04) 0%, transparent 60%);
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(212,175,55,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.login-wrap {
  width: 100%;
  max-width: 400px;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.brand {
  text-align: center;
  margin-bottom: 32px;
}

.brand-logo-wrap {
  width: 120px;
  height: 120px;
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 8px 32px rgba(59,130,246,0.4);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  color: var(--text);
  letter-spacing: 2px;
  display: block;
}

.brand-sub {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
  display: block;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px;
  backdrop-filter: blur(20px);
}

.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
}

.card-sub {
  font-size: 13px; color: var(--muted);
  margin-bottom: 28px;
}

.form-group { margin-bottom: 18px; }

.form-label {
  display: block;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--muted); margin-bottom: 8px;
}

.input-wrap { position: relative; }

.input-wrap i {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 14px;
  pointer-events: none;
}

.form-input {
  width: 100%;
  padding: 13px 44px 13px 40px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none;
  transition: all 0.25s;
}

.form-input:focus {
  border-color: var(--gold);
  background: rgba(212,175,55,0.05);
  box-shadow: 0 0 0 4px rgba(212,175,55,0.1);
}

.form-input::placeholder { color: rgba(107,122,153,0.5); }

.pw-toggle {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  background: transparent;
  z-index: 2;
  line-height: 1;
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 14px; padding: 4px;
  transition: color 0.2s;
}
.pw-toggle:hover { color: var(--gold); }

.btn-login {
  width: 100%;
  padding: 14px;
  background: var(--gold-grad);
  color: #000;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 800;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.25s;
  box-shadow: 0 6px 20px rgba(212,175,55,0.3);
  margin-top: 8px;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(212,175,55,0.45);
}

.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.error-msg {
  display: none;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 10px;
  padding: 11px 14px;
  color: #EF4444;
  font-size: 13px; font-weight: 600;
  margin-top: 14px;
  text-align: center;
}

.spinner { animation: spin 0.8s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px; color: var(--muted);
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <img src="logo.png" alt="NOS Logo" style="
      width:120px; height:120px;
      object-fit:contain;
      display:block;
      margin:0 auto 20px;
      filter: invert(40%) sepia(100%) saturate(500%) hue-rotate(190deg) brightness(1.2);
      animation: float 3s ease-in-out infinite;
    ">
    <span class="brand-name">NATIONS OF SKY</span>
    <span class="brand-sub">Admin Panel</span>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access the admin dashboard</div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" id="username" class="form-input" placeholder="username" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePw()">
          <i class="fas fa-eye" id="pw-icon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>

    <div class="error-msg" id="error-msg">
      <i class="fas fa-times-circle"></i> Invalid credentials. Please try again.
    </div>
  </div>

  <div class="footer">NOS Admin Panel v1.0 · Nations of Sky · 2026</div>
</div>

<script>
const SUPABASE_URL = 'https://xzxdaupwwwdcwfnqweub.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6eGRhdXB3d3dkY3dmbnF3ZXViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTM5NTAsImV4cCI6MjA5MDg4OTk1MH0.KjNZpFvLxh8XfDDoWdpVsIQZAh1PjzGXOrfDmApZ4K8';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function togglePw() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('pw-icon');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

async function doLogin() {
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const err      = document.getElementById('error-msg');

  if (!username || !password) {
    err.style.display = 'block';
    err.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter username and password.';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner spinner"></i> Signing in...';
  err.style.display = 'none';

  try {
    const { data, error } = await db
      .from('admins')
      .select('*')
      .eq('username', username)
      .eq('password_hash', password)
      .single();

    if (error || !data) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      err.style.display = 'block';
      err.innerHTML = '<i class="fas fa-times-circle"></i> Invalid credentials. Please try again.';
      return;
    }

    sessionStorage.setItem('nos-admin', JSON.stringify({
      username: data.username,
      role:     data.role,
      loginTime: Date.now()
    }));

    window.location.href = 'index.html';

  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    err.style.display = 'block';
    err.innerHTML = '<i class="fas fa-times-circle"></i> Something went wrong. Try again.';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

if (sessionStorage.getItem('nos-admin')) window.location.href = 'index.html';
</script>
</body>
</html>
