<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account | Nations of Sky</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="mobile.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #0f172a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(15,118,110,0.06) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  top: -30%; left: -20%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(15,118,110,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.wrapper {
  width: 100%; max-width: 420px;
  position: relative; z-index: 1;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.top-brand { text-align: center; margin-bottom: 28px; }
.brand-logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #0f766e, #0d9488, #14b8a6);
  border-radius: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
  box-shadow: 0 12px 32px rgba(15,118,110,0.4);
}
.brand-logo svg { width: 32px; height: 32px; }
.brand-logo svg line { stroke: white; stroke-width: 4; stroke-linecap: round; }
.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 800;
  color: #ffffff; letter-spacing: 2px;
}
.brand-sub {
  font-size: 11px; color: rgba(20,184,166,0.8);
  letter-spacing: 4px; text-transform: uppercase; margin-top: 4px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px; padding: 36px 32px;
  backdrop-filter: blur(20px);
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  color: #f1f5f9; margin-bottom: 6px; text-align: center;
}
.card-sub {
  font-size: 13px; color: #64748b;
  text-align: center; margin-bottom: 28px; line-height: 1.6;
}

.step { display: none; }
.step.active { display: block; animation: fadeUp 0.35s ease both; }

.form-label {
  display: block; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: #64748b; margin-bottom: 8px;
}
.form-input {
  width: 100%; padding: 13px 16px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: #f1f5f9;
  font-size: 14px; font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none; transition: all 0.25s;
}
.form-input:focus {
  border-color: #0f766e;
  background: rgba(15,118,110,0.08);
  box-shadow: 0 0 0 4px rgba(15,118,110,0.12);
}
.form-input::placeholder { color: rgba(100,116,139,0.5); }
.form-group { margin-bottom: 18px; }

.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center; gap: 8px;
  transition: all 0.25s;
}
.btn-primary {
  background: linear-gradient(135deg, #0f766e, #0d9488);
  color: white; box-shadow: 0 6px 20px rgba(15,118,110,0.35);
  margin-top: 8px;
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(15,118,110,0.5);
}
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.1);
  color: #64748b; margin-top: 10px;
}
.btn-ghost:hover { border-color: #0f766e; color: #14b8a6; }

.alert {
  padding: 12px 16px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  margin-top: 14px; display: none;
  line-height: 1.5; text-align: center;
}
.alert-error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.25); color: #f87171;
}
.alert-success {
  background: rgba(15,118,110,0.1);
  border: 1px solid rgba(15,118,110,0.3); color: #5eead4;
}

.success-icon {
  width: 64px; height: 64px;
  background: rgba(15,118,110,0.15);
  border: 2px solid rgba(15,118,110,0.4);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
}
.success-icon i { font-size: 26px; color: #14b8a6; }

.email-box {
  background: rgba(15,118,110,0.08);
  border: 1px solid rgba(15,118,110,0.2);
  border-radius: 10px; padding: 12px 16px;
  font-size: 14px; font-weight: 600; color: #5eead4;
  text-align: center; margin: 16px 0; word-break: break-all;
}

.back-link { text-align: center; margin-top: 20px; }
.back-link a {
  font-size: 13px; color: #64748b; text-decoration: none;
  transition: color 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.back-link a:hover { color: #14b8a6; }

.spinner { animation: spin 0.8s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 480px) { .card { padding: 24px 18px; } }
</style>
</head>
<body>
<div class="wrapper">

  <div class="top-brand">
    <div class="brand-logo">
      <svg viewBox="0 0 40 40" fill="none">
        <line x1="20" y1="4"  x2="20" y2="36"/>
        <line x1="4"  y1="20" x2="36" y2="20"/>
        <line x1="7"  y1="7"  x2="33" y2="33"/>
        <line x1="33" y1="7"  x2="7"  y2="33"/>
      </svg>
    </div>
    <div class="brand-name">NATIONS OF SKY</div>
    <div class="brand-sub">Agent Portal</div>
  </div>

  <div class="card">

    <!-- STEP 1: Enter Email -->
    <div class="step active" id="step-email">
      <div class="card-title">Create Account</div>
      <div class="card-sub">Enter your work email and we'll send you a confirmation link to set your password</div>

      <div class="form-group">
        <label class="form-label">Work Email</label>
        <input type="email" id="email-input" class="form-input"
          placeholder="name@nationsofsky.com" autocomplete="email">
      </div>

      <button class="btn btn-primary" id="send-btn" onclick="sendConfirmation()">
        <i class="fas fa-paper-plane"></i> Send Confirmation Link
      </button>

      <div class="alert alert-error"   id="alert-error"></div>
      <div class="alert alert-success" id="alert-success"></div>
    </div>

    <!-- STEP 2: Email Sent -->
    <div class="step" id="step-sent">
      <div class="success-icon"><i class="fas fa-envelope-open-text"></i></div>
      <div class="card-title">Check Your Email!</div>
      <div class="card-sub">We've sent a confirmation link to</div>
      <div class="email-box" id="sent-email-display"></div>
      <div class="card-sub" style="margin-bottom:0;">
        Click the link in your email to set your password and activate your account.<br><br>
        <span style="color:#f59e0b;"><i class="fas fa-clock"></i> Link expires in 24 hours</span>
      </div>
      <button class="btn btn-ghost" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Use a different email
      </button>
    </div>

  </div>

  <div class="back-link">
    <a href="index.html">
      <i class="fas fa-arrow-left"></i> Back to Login
    </a>
  </div>

</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycby49cmRMTcDGTCYy0KHOxmYxieDBRTkXiDiIFtZzpf6IKtozGPEgzOmhYuH01AG1A2Y/exec';

function gasRun(action) {
  var args = Array.prototype.slice.call(arguments, 1);
  return fetch(GAS_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: action, args: args })
  }).then(function(r){ return r.text(); })
    .then(function(t){ return JSON.parse(t); });
}

function showAlert(type, msg) {
  document.getElementById('alert-error').style.display   = 'none';
  document.getElementById('alert-success').style.display = 'none';
  var el = document.getElementById('alert-' + type);
  el.innerText = msg; el.style.display = 'block';
}

function sendConfirmation() {
  var email = document.getElementById('email-input').value.trim();
  var btn   = document.getElementById('send-btn');
  if (!email) { showAlert('error','Please enter your work email'); return; }
  if (!email.toLowerCase().endsWith('@nationsofsky.com')) {
    showAlert('error','Only @nationsofsky.com emails are allowed'); return;
  }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner spinner"></i> Sending...';
  gasRun('requestAccountCreation', email).then(function(res) {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Confirmation Link';
    if (res.status === 'success') {
      document.getElementById('sent-email-display').innerText = email;
      document.getElementById('step-email').classList.remove('active');
      document.getElementById('step-sent').classList.add('active');
    } else {
      showAlert('error', res.msg || 'Something went wrong, please try again');
    }
  }).catch(function() {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Confirmation Link';
    showAlert('error','Connection error, please try again');
  });
}

function goBack() {
  document.getElementById('step-sent').classList.remove('active');
  document.getElementById('step-email').classList.add('active');
  document.getElementById('alert-error').style.display   = 'none';
  document.getElementById('alert-success').style.display = 'none';
}

document.getElementById('email-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendConfirmation();
});
</script>
</body>
</html>
